# Marlow lives in the app/ subfolder; build from there.
[build]
  base = "app"
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# SPA fallback (the scrape function self-routes at /api/scrape-brand and takes precedence).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
