<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Marlow — write and design on-brand marketing emails in minutes, without hiring an agency." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts without blocking first paint (display=swap shows fallback text immediately). -->
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" /></noscript>
    <title>Marlow — On-brand marketing emails in minutes</title>
    <style>
      /* Instant branded first paint, shown before the app JS parses. React
         replaces #root on mount, removing this automatically. */
      html, body { margin: 0; background: #F8F4EA; }
      #root { min-height: 100vh; }
      #boot { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
      #boot img { width: 44px; height: 44px; animation: bootpulse 1.4s ease-in-out infinite; }
      #boot span { width: 20px; height: 20px; border: 2px solid #E4D8C2; border-top-color: #C2562E; border-radius: 50%; animation: bootspin .7s linear infinite; }
      @keyframes bootpulse { 0%,100%{opacity:1} 50%{opacity:.45} }
      @keyframes bootspin { to { transform: rotate(360deg) } }
    </style>
  </head>
  <body>
    <div id="root"><div id="boot"><img src="/logo-mark.svg" alt="Marlow" /><span></span></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
